<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guro Mary's Tagalog Learning Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcfbf7;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-banner {
            background-color: #2b579a;
            color: white;
            width: 100%;
            max-width: 800px;
            padding: 30px 20px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .header-banner h1 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 700;
        }
        .main-card {
            background-color: white;
            width: 100%;
            max-width: 800px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            margin-bottom: 30px;
        }
        .flag-box {
            width: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .flag-box img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .profile-circle-container {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 6px solid #f5f0e1;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05), 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #fafaf8;
        }
        .profile-circle-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .action-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 180px;
        }
        .login-btn {
            background-color: #ff9900;
            color: white;
            text-decoration: none;
            padding: 12px 35px;
            font-weight: bold;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, background-color 0.2s;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        .login-btn:hover {
            background-color: #e68a00;
            transform: translateY(-2px);
        }
        .clock-display {
            background-color: #1a1a1a;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            font-size: 0.95rem;
            width: 100%;
            box-sizing: border-box;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .quote-card {
            background-color: white;
            width: 100%;
            max-width: 800px;
            padding: 30px;
            border-radius: 8px;
            border-left: 6px solid #2b579a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
            margin-bottom: 40px;
        }
        .quote-tagalog {
            font-size: 1.25rem;
            font-style: italic;
            color: #1e3a8a;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }
        .quote-english {
            font-size: 1.05rem;
            font-style: italic;
            color: #555;
            margin-bottom: 15px;
            text-align: center;
        }
        .quote-author {
            font-size: 0.95rem;
            font-weight: bold;
            color: #333;
            text-align: right;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        footer {
            color: #777;
            font-size: 0.85rem;
            text-align: center;
            width: 100%;
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
            max-width: 800px;
        }
    </style>
</head>
<body>

    <div class="header-banner">
        <h1>Welcome to Guro Mary's Tagalog Webpage</h1>
    </div>

    <div class="main-card">
        <div class="flag-box">
            <img src="Images/flag.png" alt="Philippine Flag" onerror="this.src='https://flagcdn.com/w320/ph.png'">
        </div>

        <div class="profile-circle-container">
            <img src="Images/Mary_profile.jpg" alt="Guro Mary" onerror="this.style.display='none'; this.parentNode.innerHTML='<span style=\'color:#777;font-size:0.9rem;text-align:center;padding:10px;\'>Guro Mary</span>'">
        </div>

        <div class="action-box">
            <a href="Login.html" class="login-btn">LOG IN</a>
            <div id="live-clock" class="clock-display">Loading...</div>
        </div>
    </div>

    <div class="quote-card">
        <div class="quote-tagalog">"Ang kabataan ang pag-asa ng bayan."</div>
        <div class="quote-english">"The youth is the hope of the nation."</div>
        <div class="quote-author">— Dr. José Rizal</div>
    </div>

    <footer>
        &copy; 2026 Guro Mary's Tagalog Learning Portal. All rights reserved.
    </footer>

    <script>
        function updateClock() {
            const now = new Date();
            const optionsDate = { year: 'numeric', month: '2-digit', day: '2-digit' };
            const optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            
            const dateStr = now.toLocaleDateString('en-US', optionsDate);
            const timeStr = now.toLocaleTimeString('en-US', optionsTime);
            
            document.getElementById('live-clock').innerHTML = `${dateStr}<br>${timeStr}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
